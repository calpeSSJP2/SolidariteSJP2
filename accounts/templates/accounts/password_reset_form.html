{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="container mt-5">
  <h3>Forgot Your Password?</h3>
  <p>Enter your email address below so that you will be allowed to <br> login your Solidarite accounts.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.email.label_tag }}
    {{ form.email }}
    <br>
    <button type="submit" class="btn btn-primary mt-3">Send Reset Email</button>
  </form>
</div>
{% endblock %}
