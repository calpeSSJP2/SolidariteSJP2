{% extends 'base.html' %}
{% load static %}
{% block content %}
<h2>Decisions</h2>
<a href="{% url 'meeting_Mngt:decision-create' %}">Add Decision</a>
<ul>
    {% for decision in decisions %}
        <li>{{ decision.meeting }} - {{ decision.decision_text }}
        {% if decision.implemented %}✅{% else %}❌{% endif %}
        </li>
    {% endfor %}
</ul>
{% endblock %}
